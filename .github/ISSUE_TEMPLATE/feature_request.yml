name: Feature request
description: Suggest an improvement for DevLoop AI.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user pain or maintainer workflow should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful version.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: safety
    attributes:
      label: Safety impact
      options:
        - label: This feature preserves dry-run or human-review defaults.
        - label: This feature does not require secrets in test processes.
        - label: This feature does not auto-merge pull requests.
