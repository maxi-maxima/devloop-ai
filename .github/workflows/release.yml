name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build, test, and create release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Pack npm tarball
        run: npm pack

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" ./*.tgz --generate-notes

      # To publish to npm without a long-lived NPM_TOKEN, enable npm trusted
      # publishing for this repository and set repository variable NPM_PUBLISH=true.
      # The id-token permission above lets npm verify this GitHub Actions run.
      - name: Publish npm package with provenance
        if: ${{ vars.NPM_PUBLISH == 'true' }}
        run: npm publish --provenance --access public
