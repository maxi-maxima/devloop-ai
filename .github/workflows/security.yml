name: Security

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # GitHub masks this token automatically. The workflow does not print it.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit high and critical vulnerabilities
        run: npm audit --audit-level=high --registry=https://registry.npmjs.org

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    # CodeQL upload is free for public repositories. Private repositories may
    # require GitHub Advanced Security, so keep it opt-in there via repository
    # variable ENABLE_CODEQL_ON_PRIVATE=true.
    if: ${{ github.event.repository.private == false || vars.ENABLE_CODEQL_ON_PRIVATE == 'true' }}
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        uses: github/codeql-action/analyze@v4
