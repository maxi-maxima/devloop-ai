name: CI

on:
  pull_request:
  push:
    branches:
      - main

# CI only needs to read repository contents. Write permissions are intentionally
# omitted so failed or compromised test jobs cannot modify code, issues, or PRs.
permissions:
  contents: read

jobs:
  quality:
    name: Build, lint, typecheck, and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
